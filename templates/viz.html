<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLP · Digit Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#060b12;--panel:#080e18;--border:#0f2030;
    --green:#39ff9a;--cyan:#00e5ff;--yellow:#ffe03d;
    --dim:#1a3040;--text:#dfe8f5;--label:#9fb6d2;
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace}
  
  /* scanline overlay */
  body::after{content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
    pointer-events:none;z-index:999}

  #app{display:flex;height:100%;flex-direction:column}

  /* HEADER */
  #hdr{display:flex;align-items:center;gap:14px;padding:10px 20px;
    border-bottom:1px solid var(--border);background:#040810;flex-shrink:0}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);animation:blink 2.5s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  #hdr h1{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;
    letter-spacing:4px;text-transform:uppercase;color:var(--text)}
  #arch-label{margin-left:auto;font-size:10px;letter-spacing:2px;color:var(--text)}

  /* BODY */
  #body{display:flex;flex:1;overflow:hidden}

  /* LEFT PANEL */
  #left{width:380px;flex-shrink:0;border-right:1px solid var(--border);
    padding:18px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;background:var(--panel)}

  .sec-lbl{font-size:9px;letter-spacing:3px;color:var(--text);text-transform:uppercase;
    border-bottom:1px solid var(--border);padding-bottom:4px; margin-top: 10px;}

  #pred-box{text-align:center;padding:12px;background:#040c14;border:1px solid var(--border);
    border-radius:3px;position:relative;overflow:hidden}
  #pred-box::before{content:'PREDICTED';position:absolute;top:6px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:3px;color:var(--label)}
  #pred-digit{font-family:'Rajdhani',sans-serif;font-size:96px;font-weight:700;
    color:var(--green);line-height:1;margin-top:14px;
    text-shadow:0 0 30px rgba(57,255,154,.5);transition:all .3s}
  #pred-conf{font-size:12px;color:var(--label);margin-top:4px}

  #conf-list{display:flex;flex-direction:column;gap:3px; max-height: 180px; overflow-y: auto;}
  .cr{display:flex;align-items:center;gap:8px;font-size:12px;height:18px}
  .cn{width:22px;text-align:right;color:var(--label); font-weight:bold;}
  .cb{flex:1;height:6px;background:var(--dim);border-radius:3px;overflow:hidden}
  .cf{height:100%;background:linear-gradient(90deg,#0a4a2a,var(--green));
    border-radius:2px;transition:width .25s ease;min-width:1px}
  .cp{width:42px;text-align:right;font-size:11px;color:var(--label)}
  .cr.active .cn{color:var(--green)}
  .cr.active .cf{background:linear-gradient(90deg,#0a6a3a,var(--yellow))}
  .cr.active .cp{color:var(--green)}

  /* ACT BARS */
  #act-section{display:flex;flex-direction:column;gap:6px}
  .act-row{display:flex;flex-direction:column;gap:4px}
  .act-row span{font-size:10px;}
  .act-row canvas{height:14px;width:100%;image-rendering:pixelated;border-radius:2px;background:#040c14;}

  #back-btn{
    background:transparent;border:1px solid var(--border);color:var(--label);
    padding:7px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:10px;
    letter-spacing:2px;text-transform:uppercase;width:100%;transition:all .2s;border-radius:2px;
    margin-top: 10px;
  }
  #back-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 10px rgba(0,229,255,.15)}

  /* RIGHT PANEL */
  #right{flex:1;position:relative;overflow:hidden}
  #viz-canvas{width:100%;height:100%;display:block}

  /* Animation controls overlay */
  #anim-controls{position:absolute;top:12px;left:12px;display:flex;gap:8px;z-index:10;
    background:rgba(4,8,16,.75);border:1px solid var(--border);border-radius:6px;padding:8px 10px;
    backdrop-filter:blur(6px)}
  #anim-controls button{background:transparent;border:1px solid var(--border);color:var(--label);
    padding:6px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:'Share Tech Mono',monospace;
    transition:all .15s}
  #anim-controls button:hover{color:var(--cyan);border-color:var(--cyan)}
  #anim-controls .primary{color:var(--green);border-color:var(--green)}

</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="dot"></div>
    <h1>MLP Neural Visualizer</h1>
    <span id="arch-label">784 → 512 → 256 → 10 &nbsp;|&nbsp; PyTorch</span>
  </div>
  <div id="body">
    <div id="left">

      <div id="pred-box">
        <div id="pred-digit">?</div>
        <div id="pred-conf">Loading...</div>
      </div>

      <div class="sec-lbl">Confidence per class</div>
      <div id="conf-list"></div>

      <div class="sec-lbl">Layer activations (2D view)</div>
      <div id="act-section">
        <div class="act-row"><span style="font-size:10px;color:var(--label)">FC1 &nbsp;(512)</span><canvas id="act1" height="14"></canvas></div>
        <div class="act-row"><span style="font-size:10px;color:var(--label)">FC2 &nbsp;(256)</span><canvas id="act2" height="14"></canvas></div>
        <div class="act-row"><span style="font-size:10px;color:var(--label)">Output (10)</span><canvas id="act3" height="14"></canvas></div>
      </div>

      <button id="back-btn" onclick="window.location.href='/'">← Draw Again</button>

    </div>

    <div id="right">
      <canvas id="viz-canvas"></canvas>
      <div id="anim-controls">
        <button id="btn-replay" class="primary">Replay</button>
        <button id="btn-play">Pause</button>
        <button id="btn-speed">Speed: normal</button>
      </div>
      <div id="layer-overlay">
        <div class="ll"><b>INPUT</b>784 units</div>
        <div class="ll"><b>FC 1</b>512 neurons</div>
        <div class="ll"><b>FC 2</b>256 neurons</div>
        <div class="ll"><b>OUTPUT</b>10 classes</div>
      </div>
      <div id="hint">drag · scroll · dblclick reset</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Helpers ─────────────────────────────────────────────────────────────────
function normArr(a){
  const mx=Math.max(...a,1e-9),mn=Math.min(...a);const r=mx-mn||1;
  return a.map(v=>(v-mn)/r);
}

function hueColor(v){
  const c=new THREE.Color();
  const h=0.33-0.12*v;
  const l=Math.max(0.25,0.15+0.55*v); // ensure weak values stay visible
  c.setHSL(h,1,l);
  return c;
}

function makeLabelSprite(text){
  const size=128;
  const canvas=document.createElement('canvas');
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,0)';
  ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#cfe8ff';
  ctx.font='bold 48px Rajdhani, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(text,size/2,size/2+6);
  const tex=new THREE.CanvasTexture(canvas);
  tex.needsUpdate=true;
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
  const spr=new THREE.Sprite(mat);
  spr.scale.set(0.9,0.9,0.9);
  return spr;
}

function drawActBar(canvasId,activations){
  const cv=document.getElementById(canvasId); if(!cv)return;
  cv.width=activations.length;cv.style.width='100%';
  const ctx=cv.getContext('2d');
  for(let i=0;i<activations.length;i++){
    const v=activations[i];
    const h=120+v*70; const l=18+v*50;
    ctx.fillStyle=`hsl(${h},85%,${l}%)`;
    ctx.fillRect(i,0,1,12);
  }
}

function topIndices(arr,count){return [...arr.keys()].sort((a,b)=>arr[b]-arr[a]).slice(0,count);}

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────
const vc=document.getElementById('viz-canvas');
const renderer=new THREE.WebGLRenderer({canvas:vc,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x050a11,1);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x050a11,28,90);
const camera=new THREE.PerspectiveCamera(45,1,0.1,300);

scene.add(new THREE.AmbientLight(0x0c1c24,2.3));
const key=new THREE.PointLight(0x39ff9a,3,120);key.position.set(-6,8,20);scene.add(key);
const rim=new THREE.PointLight(0x00d0ff,1.5,90);rim.position.set(18,-6,-10);scene.add(rim);

// Subtle floor grid to ground the scene
const grid=new THREE.GridHelper(200,100,0x0c3028,0x0c3028);
grid.material.transparent=true;grid.material.opacity=0.22;
if(Array.isArray(grid.material)){
  grid.material.forEach(m=>{m.transparent=true;m.opacity=0.22;});
}
grid.position.y=-4;
scene.add(grid);

const glowGeo=new THREE.PlaneGeometry(160,160);
const glowMat=new THREE.MeshBasicMaterial({color:0x071018,transparent:true,opacity:0.32,side:THREE.DoubleSide});
const glow=new THREE.Mesh(glowGeo,glowMat);glow.rotation.x=-Math.PI/2;glow.position.y=-8;scene.add(glow);

const POS={inp:-15,l1:-5,l2:5,out:15}; // used on Z axis

// ─── Layer grids ────────────────────────────────────────────────────────────
function buildGrid(cols,rows,spacing,x,size){
  const grp=new THREE.Group();
  grp.position.set(0,0,x);
  const cells=[];
  const geo=new THREE.SphereGeometry(size,10,8);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const mat=new THREE.MeshBasicMaterial({color:0x4a5568,transparent:true,opacity:0.28});
      const m=new THREE.Mesh(geo,mat);
      m.position.set((c-(cols-1)/2)*spacing,(rows/2-r)*spacing*0.95,0);
      cells.push(m);grp.add(m);
    }
  }
  return {group:grp,cells};
}

const layer1=buildGrid(24,22,0.3,POS.l1,0.09); // 512 ~24x22 (z)
const layer2=buildGrid(16,16,0.35,POS.l2,0.11); // 256 (z)
scene.add(layer1.group);scene.add(layer2.group);

// Output layer: 10 nodes line (0-9)
const fc3Grp=new THREE.Group();
fc3Grp.position.set(0,0,POS.out);
const fc3Nodes=[]; const fc3Labels=[];
const outGeo=new THREE.SphereGeometry(0.35,14,10);
for(let i=0;i<10;i++){
  const mat=new THREE.MeshBasicMaterial({color:0x4a5568,transparent:true,opacity:0.32});
  const m=new THREE.Mesh(outGeo,mat);
  const x=(i-4.5)*1.0;
  m.position.set(x,0,0);
  fc3Nodes.push(m);fc3Grp.add(m);

  const lbl=makeLabelSprite(i.toString());
  lbl.position.set(x,-0.8,0.05);
  lbl.scale.set(0.5,0.5,0.5);
  fc3Labels.push(lbl);
  fc3Grp.add(lbl);
}
scene.add(fc3Grp);

// ─── Output panel (pixel map) ───────────────────────────────────────────────
const panelGroup=new THREE.Group();
panelGroup.position.set(0,0,POS.inp);
const panelBG=new THREE.Mesh(
  new THREE.PlaneGeometry(10,10),
  new THREE.MeshBasicMaterial({color:0x071018,transparent:true,opacity:0.3,side:THREE.DoubleSide})
);
panelGroup.add(panelBG);

const frame=new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.PlaneGeometry(10,10)),
  new THREE.LineBasicMaterial({color:0x1c4f35,transparent:true,opacity:0.5})
);
panelGroup.add(frame);

const pxCells=[];
const pxGeo=new THREE.PlaneGeometry(0.17,0.17);
for(let r=0;r<28;r++)for(let c=0;c<28;c++){
  const mat=new THREE.MeshBasicMaterial({color:0x4a5568,side:THREE.DoubleSide,transparent:true,opacity:0.1});
  const m=new THREE.Mesh(pxGeo,mat);
  m.position.set((c-13.5)*0.18,(13.5-r)*0.18,0.01);
  panelGroup.add(m);pxCells.push(m);
}
scene.add(panelGroup);

// ─── Connections ────────────────────────────────────────────────────────────
const tmp1=new THREE.Vector3();
const tmp2=new THREE.Vector3();
function wp(obj,target){return obj.getWorldPosition(target||new THREE.Vector3());}

let segments={in_l1:null,l1_l2:null,l2_out:null};

function disposeSegment(seg){
  if(!seg||!seg.line) return;
  scene.remove(seg.line);
  seg.line.geometry.dispose();
  seg.line.material.dispose();
}

function makeLines(edges){
  const pos=[],start=[],end=[],col=[],aT=[];
  edges.forEach(e=>{
    const cool=new THREE.Color(0x2c3542);
    const t=Math.max(0.18,Math.min(1,e.intensity));
    const hot=hueColor(Math.max(0.05,Math.min(1,e.intensity)));
    const c=cool.clone().lerp(hot,Math.max(0.55,t)); // bias toward brighter hues
    pos.push(e.p1.x,e.p1.y,e.p1.z,e.p2.x,e.p2.y,e.p2.z);
    start.push(e.p1.x,e.p1.y,e.p1.z,e.p1.x,e.p1.y,e.p1.z);
    end.push(e.p2.x,e.p2.y,e.p2.z,e.p2.x,e.p2.y,e.p2.z);
    aT.push(0,1);
    col.push(c.r,c.g,c.b,c.r,c.g,c.b);
  });

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('start',new THREE.Float32BufferAttribute(start,3));
  geo.setAttribute('end',new THREE.Float32BufferAttribute(end,3));
  geo.setAttribute('aT',new THREE.Float32BufferAttribute(aT,1));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  geo.computeBoundingSphere();

  const uProg={value:0};
  const mat=new THREE.LineBasicMaterial({
    vertexColors:true,
    transparent:true,
    opacity:0.45,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });
  mat.onBeforeCompile=shader=>{
    shader.uniforms.uProg=uProg;
    shader.vertexShader=shader.vertexShader
      .replace('#include <common>','#include <common>\nattribute vec3 start;\nattribute vec3 end;\nattribute float aT;\nuniform float uProg;')
      .replace('#include <begin_vertex>','vec3 transformed = mix(start,end,aT*uProg);');
  };

  const line=new THREE.LineSegments(geo,mat);
  line.visible=false;
  scene.add(line);
  return {line,uProg,animating:false,elapsed:0,duration:0,onDone:null};
}

function rebuildSegments(pxn,h1n,h2n,outn){
  disposeSegment(segments.in_l1);disposeSegment(segments.l1_l2);disposeSegment(segments.l2_out);

  const edges1=[],edges2=[],edges3=[];
  const topPx=topIndices(pxn,150);
  const topL1=topIndices(h1n,140);
  const topL2=topIndices(h2n,120);
  const topOut=topIndices(outn,10);

  // input pixels -> layer1 (sampled)
  topPx.forEach((pi,idx)=>{
    const p1=wp(pxCells[pi],tmp1.clone());
    const li=topL1[idx % topL1.length];
    const p2=wp(layer1.cells[li],tmp2.clone());
    edges1.push({p1,p2,intensity:(pxn[pi]+h1n[li])*0.6});
  });

  // layer1 -> layer2
  topL1.forEach((i,idx)=>{
    const p1=wp(layer1.cells[i],tmp1.clone());
    for(let k=0;k<3;k++){
      const j=topL2[(idx*3+k)%topL2.length];
      const p2=wp(layer2.cells[j],tmp2.clone());
      edges2.push({p1,p2,intensity:(h1n[i]+h2n[j])*0.5});
    }
  });

  // layer2 -> output (10 nodes)
  topL2.forEach((i,idx)=>{
    const p1=wp(layer2.cells[i],tmp1.clone());
    const j=topOut[idx % topOut.length];
    const p2=wp(fc3Nodes[j],tmp2.clone());
    edges3.push({p1,p2,intensity:(h2n[i]+outn[j])*0.5});
  });

  segments.in_l1 = makeLines(edges1);
  segments.l1_l2 = makeLines(edges2);
  segments.l2_out = makeLines(edges3);
}

// ─── Animation state ────────────────────────────────────────────────────────
const speedOptions=[{name:'slow',delay:1200},{name:'normal',delay:750},{name:'fast',delay:350}];
let speedIdx=1;
let animStep=0; let animTimer=null; let animPlaying=true;
let lastAct={px:[],h1n:[],h2n:[],outn:[],pred:'?',label:0,probs:[]};

const BASE_LINE_MS=420;
function lineDuration(){ return Math.max(240,speedOptions[speedIdx].delay*0.65||BASE_LINE_MS); }

function resetLineAnimations(){
  Object.values(segments).forEach(seg=>{
    if(!seg) return;
    seg.animating=false; seg.elapsed=0; seg.duration=0; seg.uProg.value=0;
    seg.line.visible=false; seg.onDone=null;
  });
}

function startLineAnimation(name,onDone){
  const seg=segments[name];
  if(!seg){ if(onDone) onDone(); return; }
  seg.animating=true; seg.elapsed=0; seg.duration=lineDuration();
  seg.uProg.value=0; seg.line.visible=true; seg.onDone=onDone||null;
}

function tickLineAnimations(dt){
  Object.values(segments).forEach(seg=>{
    if(!seg||!seg.animating) return;
    seg.elapsed+=dt;
    const t=Math.min(seg.elapsed/(seg.duration||1),1);
    seg.uProg.value=t;
    if(t>=1){
      seg.animating=false;
      const cb=seg.onDone; seg.onDone=null;
      if(cb) cb();
    }
  });
}

const playBtn=document.getElementById('btn-play');
const replayBtn=document.getElementById('btn-replay');
const speedBtn=document.getElementById('btn-speed');

function updateControls(){
  playBtn.textContent=animPlaying?'Pause':'Play';
  speedBtn.textContent=`Speed: ${speedOptions[speedIdx].name}`;
}

function clearTimer(){ if(animTimer){clearTimeout(animTimer);animTimer=null;} }

function dimAll(){
  layer1.cells.forEach(m=>{m.material.color.set(0x4a5568);m.material.opacity=0.28;});
  layer2.cells.forEach(m=>{m.material.color.set(0x4a5568);m.material.opacity=0.28;});
  fc3Nodes.forEach(m=>{m.material.color.set(0x4a5568);m.material.opacity=0.32;m.scale.setScalar(1);});
  pxCells.forEach(m=>{m.material.color.set(0x4a5568);m.material.opacity=0.1;});
  resetLineAnimations();
  panelBG.material.opacity=0.25; frame.material.opacity=0.35;
}

function lightInput(){
  const px=lastAct.px;
  for(let i=0;i<pxCells.length;i++){
    const v=px[i]||0; const c=hueColor(v);
    pxCells[i].material.color.copy(c);
    pxCells[i].material.opacity=0.2+0.8*v;
  }
}

function lightLayer(cells,values){
  const n=values.length;
  for(let i=0;i<cells.length;i++){
    const v=values[i%n];
    cells[i].material.color.copy(hueColor(v));
    cells[i].material.opacity=0.35+0.55*v;
  }
}

function lightOutput(){
  const out=lastAct.outn;
  const hiFromLabel=(lastAct.label>=0 && lastAct.label<10)?lastAct.label:-1;
  let hiIdx=0,hiVal=-Infinity;
  for(let i=0;i<out.length;i++){ if(out[i]>hiVal){hiVal=out[i];hiIdx=i;} }
  const target= hiFromLabel>=0 ? hiFromLabel : hiIdx;
  const bright=new THREE.Color(0xd8ff4d);
  for(let i=0;i<fc3Nodes.length;i++){
    const v=out[i]||0;
    const mat=fc3Nodes[i].material;
    if(i===target){
      mat.color.copy(bright);
      mat.opacity=0.95;
      fc3Labels[i].material.opacity=0.95;
    }else{
      mat.color.copy(hueColor(v*0.6));
      mat.opacity=0.25+0.4*v;
      fc3Labels[i].material.opacity=0.6;
    }
  }
}

function showPanel(){
  panelBG.material.opacity=0.9; frame.material.opacity=0.6;
}

function runStep(){
  clearTimer();
  const hold=speedOptions[speedIdx].delay;
  switch(animStep){
    case 0:
      lightInput();
      if(animPlaying) animTimer=setTimeout(()=>{animStep++; runStep();}, hold);
      break;
    case 1:
      startLineAnimation('in_l1',()=>{
        lightLayer(layer1.cells,lastAct.h1n);
        if(animPlaying) animTimer=setTimeout(()=>{animStep++; runStep();}, hold);
      });
      break;
    case 2:
      startLineAnimation('l1_l2',()=>{
        lightLayer(layer2.cells,lastAct.h2n);
        if(animPlaying) animTimer=setTimeout(()=>{animStep++; runStep();}, hold);
      });
      break;
    case 3:
      startLineAnimation('l2_out',()=>{
        lightOutput(); showPanel();
      });
      break;
    default: break;
  }
  updateControls();
}

function startAnimation(restart=true){
  clearTimer();
  if(restart){animStep=0; dimAll(); runStep();}
  else {
    if(!animPlaying){animPlaying=true; runStep();}
  }
}

playBtn.addEventListener('click',()=>{
  animPlaying=!animPlaying;
  if(animPlaying) runStep(); else clearTimer();
  updateControls();
});

replayBtn.addEventListener('click',()=>{animPlaying=true; startAnimation(true);});

speedBtn.addEventListener('click',()=>{
  speedIdx=(speedIdx+1)%speedOptions.length;
  updateControls();
});

// ─── Data ingest ────────────────────────────────────────────────────────────
function applyData(stored){
  const px=stored.raw_pixels||new Float32Array(784).fill(0);
  const h1=stored.raw_h1||new Float32Array(512).fill(0);
  const h2=stored.raw_h2||new Float32Array(256).fill(0);
  const outFull=stored.raw_h3||new Float32Array(10).fill(0);
  const probs=stored.probabilities||new Float32Array(10).fill(0);
  const predChar=stored.prediction||'?';
  const labelIndex=stored.label_index||0;

  // use first 10 outputs for digits 0-9
  const out10=Array.from(outFull).slice(0,10);

  const h1n=normArr(h1); const h2n=normArr(h2); const outn=normArr(out10);
  const pxn=normArr(px);

  lastAct={px:pxn,h1n,h2n,outn,pred:predChar,label:labelIndex,probs};

  rebuildSegments(pxn,h1n,h2n,outn);
  dimAll();
  animPlaying=true; animStep=0; runStep();

  document.getElementById('pred-digit').textContent=predChar;
  document.getElementById('pred-conf').textContent=((probs[labelIndex]||0)*100).toFixed(1)+'% confidence';

  const confList=document.getElementById('conf-list');
  confList.innerHTML='';
  let sortedProbs=[...probs].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
  if(sortedProbs.length===0){for(let i=0;i<10;i++)sortedProbs.push({p:i===0?1:0,i});}

  sortedProbs.forEach(item=>{
    const i=item.i;const row=document.createElement('div');row.className='cr';
    let labelDisplay=(i<10?i:(i<36?String.fromCharCode(i-10+65):['a','b','d','e','f','g','h','n','q','r','t'][i-36]||'?'));
    if(i===labelIndex) labelDisplay=predChar;
    row.innerHTML=`<span class="cn">${labelDisplay}</span><div class="cb"><div class="cf" id="cf${i}" style="width:10%"></div></div><span class="cp" id="cp${i}">10%</span>`;
    confList.appendChild(row);
    const fill=document.getElementById('cf'+i);
    const pctEl=document.getElementById('cp'+i);
    const pct=(item.p*100);
    if(fill) fill.style.width=Math.max(pct,0.5).toFixed(1)+'%';
    if(pctEl) pctEl.textContent=pct.toFixed(0)+'%';
    if(i===labelIndex) row.classList.add('active');
  });

  drawActBar('act1',h1n);
  drawActBar('act2',h2n);
  drawActBar('act3',outn);
}

function loadAndApplyData(){
  let stored=null;
  try{const raw=localStorage.getItem('mlp_last_result'); if(raw) stored=JSON.parse(raw);}catch(e){}
  if(stored) applyData(stored);
}

window.addEventListener('storage',e=>{if(e.key==='mlp_last_result')loadAndApplyData();});
loadAndApplyData();

// ─── Camera orbit ───────────────────────────────────────────────────────────
let theta=0.12,phi=0.06,radius=42,drag=false,autoRot=true,prevM={x:0,y:0};
vc.addEventListener('mousedown',e=>{drag=true;autoRot=false;prevM={x:e.clientX,y:e.clientY};});
vc.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta-=(e.clientX-prevM.x)*0.005;
  phi=Math.max(-0.55,Math.min(0.55,phi+(e.clientY-prevM.y)*0.005));
  prevM={x:e.clientX,y:e.clientY};
});
vc.addEventListener('mouseup',()=>{drag=false;});
vc.addEventListener('mouseleave',()=>{drag=false;});
vc.addEventListener('wheel',e=>{radius=Math.max(16,Math.min(70,radius+e.deltaY*0.035));});
vc.addEventListener('dblclick',()=>{autoRot=true;theta=0.12;phi=0.14;radius=38;});

function resize(){
  const rp=document.getElementById('right');
  renderer.setSize(rp.clientWidth,rp.clientHeight);
  camera.aspect=rp.clientWidth/rp.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);resize();

let t=0,lastFrame=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min(now-lastFrame,120); // ms
  lastFrame=now;

  if(animPlaying) tickLineAnimations(dt);

  t+=0.01;
  if(autoRot) theta+=0.0022;
  camera.position.set(
    Math.sin(theta)*Math.cos(phi)*radius,
    Math.sin(phi)*radius+2,
    Math.cos(theta)*Math.cos(phi)*radius
  );
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}

animate();
</script>
